services:
  - type: web
    name: ppiu-enrollment-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_mIib6rlhvcH7@ep-divine-cake-aoobb6by.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://ppiu-enrollment.vercel.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: false
